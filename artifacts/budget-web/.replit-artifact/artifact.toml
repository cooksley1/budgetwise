kind = "web"
previewPath = "/"
title = "Wayfare — Web App"
version = "1.0.0"
id = "artifacts/budget-web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19118

[services.development]
run = "pnpm --filter @workspace/budget-web run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/budget-web", "run", "build" ]
publicDir = "artifacts/budget-web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19118"
BASE_PATH = "/"
