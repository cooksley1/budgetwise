The fastest fix is to create the file directly on GitHub's web UI. Here's exactly what to do:

Go to this URL: github.com/cooksley1/budgetwise/new/main
In the filename box at the top, type exactly: .github/workflows/ci.yml (GitHub will auto-create the folders)
Paste this content into the editor:
name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  typecheck-and-build:
    name: Typecheck & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Typecheck all packages
        run: pnpm run typecheck
      - name: Build all packages
        run: pnpm run build
        env:
          DATABASE_URL: postgres://ci:ci@localhost:5432/ci
